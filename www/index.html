<!DOCTYPE html>
<html lang="de">
<head>

  <title>deltadr.ai</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <div class="app" x-data="indexViewModel()">

    <div class="mesh" aria-hidden="true">
      <template x-for="edge in edges" :key="edge.key">
        <div class="mesh-edge" :style="edge.style"></div>
      </template>
      <template x-for="node in nodes" :key="node.x + '-' + node.y">
        <div class="mesh-node" :style="{ left: node.x + '%', top: node.y + '%' }"></div>
      </template>
    </div>

    <div class="logo-block">
      <svg class="logo-icon" viewBox="0 0 479 436" role="img" aria-label="deltadr.ai Logo" xmlns="http://www.w3.org/2000/svg">

                 M 429,348 L 429,366 L 422,392 L 407,417 L 386,436 L 479,436 Z" />
      </svg>

      <div class="wordmark-group">
        <div class="wordmark">
          <span class="wordmark__delta">delta</span><span class="wordmark__dr">dr</span><span class="wordmark__ai">.ai</span>
        </div>
        <div class="subtitle">Heat &bull; Compute &bull; Circular</div>
      </div>
    </div>

  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
